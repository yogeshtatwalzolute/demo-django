# Generated by CICDAgent — EC2 SSM deploy (no public IP required)
# Requires: EC2 instance has AmazonSSMManagedInstanceCore IAM policy
name: Agentic EC2 deploy (SSM)

concurrency:
  group: agentic-ec2-ssm-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::396854161863:role/GitHubDeploy-yogeshtatwalzolute-demo-django
          aws-region: ap-south-1
      - name: Deploy via SSM
        env:
          GITHUB_TOKEN: ${{ github.token }}
          EC2_INSTANCE_ID: "i-079f6449d1932fe36"
          API_URL: "app-2026050510535086580000000c-623682843.ap-south-1.elb.amazonaws.com"
        run: |
          INSTANCE_ID="${EC2_INSTANCE_ID:-}"
          DEPLOY_REGION="ap-south-1"
          if [ -n "${API_URL:-}" ]; then
            API_REGION=$(echo "$API_URL" | sed -nE 's#.*\.elb\.([a-z]{2}-[a-z]+-[0-9])\.amazonaws\.com.*#\1#p')
            if [ -n "$API_REGION" ]; then
              DEPLOY_REGION="$API_REGION"
            fi
          fi
          echo "Using AWS region for deploy: $DEPLOY_REGION"
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "null" ]; then
            echo "EC2_INSTANCE_ID not set. Attempting auto-discovery of online SSM managed instances..."
            CANDIDATES=$(aws ssm describe-instance-information --region "$DEPLOY_REGION" \
              --filters Key=PingStatus,Values=Online \
              --query "InstanceInformationList[?ResourceType=='EC2Instance'].InstanceId" \
              --output text 2>/dev/null || true)
            set -- $CANDIDATES
            if [ $# -eq 1 ]; then
              INSTANCE_ID="$1"
              echo "Auto-selected EC2 instance: $INSTANCE_ID"
            elif [ $# -eq 0 ]; then
              echo "ERROR: No online SSM managed EC2 instances found in target region."
              echo "Set EC2_INSTANCE_ID in repo vars/secrets to a valid instance id."
              exit 1
            else
              echo "ERROR: Multiple online SSM EC2 instances found: $CANDIDATES"
              echo "Set EC2_INSTANCE_ID in repo vars/secrets to choose the target instance."
              exit 1
            fi
          fi
          if ! [[ "$INSTANCE_ID" =~ ^i-[a-zA-Z0-9]{8,}$ ]]; then
            echo "ERROR: Invalid EC2_INSTANCE_ID format: '$INSTANCE_ID'"
            exit 1
          fi
          echo "Verifying instance is registered and online in SSM..."
          SSM_ONLINE=0
          for k in {1..24}; do
            SSM_PING=$(aws ssm describe-instance-information --region "$DEPLOY_REGION" \
              --filters Key=InstanceIds,Values="$INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' --output text 2>/dev/null || echo "")
            if [ "$SSM_PING" = "Online" ]; then
              SSM_ONLINE=1
              break
            fi
            echo "SSM registration pending for $INSTANCE_ID (attempt $k/24, ping='${SSM_PING:-none}')"
            sleep 10
          done
          if [ "$SSM_ONLINE" != "1" ]; then
            ONLINE_IDS=$(aws ssm describe-instance-information --region "$DEPLOY_REGION" \
              --filters Key=PingStatus,Values=Online \
              --query "InstanceInformationList[?ResourceType=='EC2Instance'].InstanceId" \
              --output text 2>/dev/null || true)
            echo "ERROR: Instance $INSTANCE_ID is not online in AWS SSM after waiting."
            echo "Online SSM EC2 instances in region: ${ONLINE_IDS:-<none>}"
            echo "Check EC2 IAM role (AmazonSSMManagedInstanceCore), SSM agent, and region/account mismatch."
            exit 1
          fi
          echo "Sending SSM command directly to instance: $INSTANCE_ID"
          SSM_PARAMS_JSON=$(printf '%s' '' | base64 -d)
          SSM_PARAMS_JSON=${SSM_PARAMS_JSON//__AGENTIC_GITHUB_TOKEN__/$GITHUB_TOKEN}
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$SSM_PARAMS_JSON" \
            --region "$DEPLOY_REGION" \
            --query 'Command.CommandId' \
            --output text)
          echo "SSM Command ID: $COMMAND_ID"
          FINAL_STATUS="Pending"
          for j in {1..60}; do
            FINAL_STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$DEPLOY_REGION" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")
            echo "SSM command status: $FINAL_STATUS (attempt $j/60)"
            if [ "$FINAL_STATUS" = "Success" ]; then
              break
            fi
            if [ "$FINAL_STATUS" = "Failed" ] || [ "$FINAL_STATUS" = "TimedOut" ] || [ "$FINAL_STATUS" = "Cancelled" ]; then
              break
            fi
            sleep 5
          done
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$DEPLOY_REGION" \
            --query '[Status,StatusDetails,ResponseCode,StandardOutputContent,StandardErrorContent]' \
            --output text
          if [ "$FINAL_STATUS" != "Success" ]; then
            echo "ERROR: SSM command did not succeed (status=$FINAL_STATUS)"
            exit 1
          fi
